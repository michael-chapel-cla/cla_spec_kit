app: # Application version
  environment: 'uat' # Environment (dev/qa/uat/stage/prod)

replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  limits:
    cpu: 150m
    memory: 350Mi
  requests:
    cpu: 100m
    memory: 300Mi
   
istio:
  hosts: ["<app-hostname>.uat.claitdev.com"]

serviceAccount:
  azureWorkloadIdentityClientId: '<azure-workload-identity-client-id>' #uat-<env>-<app>-uami-001
