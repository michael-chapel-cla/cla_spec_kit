app: # Application version
  environment: 'sbx' # Environment (dev/qa/stage/prod)

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  limits:
    cpu: 150m
    memory: 350Mi
  requests:
    cpu: 100m
    memory: 300Mi

istio:
  hosts: ["<app-hostname>.sbx.claitdev.com"]
  authorizationPolicy:
    enabled: true
    name: allow-cross-ns
    namespace: <namespace>    # optional: override policy namespace; defaults to release namespace
    allowedServiceAccounts:
      - namespace: <allowed-namespace>
        name: <allowed-service-account>

serviceAccount:
  azureWorkloadIdentityClientId: '<azure-workload-identity-client-id>' #sbx-<env>-<app>-uami-001
