app:
  environment: 'dev'

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

resources:
  limits:
    cpu: 150m
    memory: 350Mi
  requests:
    cpu: 100m
    memory: 300Mi

istio:
  hosts: ["expense-flow.dev.claitdev.com"]

serviceAccount:
  azureWorkloadIdentityClientId: '<dev-expense-flow-web-uami-client-id>'
